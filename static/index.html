<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江苏财会职业学院人工智能实训平台辅助系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

.header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.header h1 { font-size: 20px; font-weight: 600; }
.header .subtitle { font-size: 12px; opacity: 0.8; }

.container { max-width: 1200px; margin: 0 auto; padding: 16px; }

.card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; overflow: hidden; }
.card-header { padding: 14px 20px; border-bottom: 1px solid #e8e8e8; font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
.card-body { padding: 16px 20px; }

/* Login */
.login-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.login-status { padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 500; }
.login-status.offline { background: #fff1f0; color: #cf1322; }
.login-status.online { background: #f6ffed; color: #389e0d; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; text-decoration: none; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: #1a73e8; color: #fff; }
.btn-primary:hover:not(:disabled) { background: #1557b0; }
.btn-success { background: #52c41a; color: #fff; }
.btn-success:hover:not(:disabled) { background: #389e0d; }
.btn-warning { background: #faad14; color: #fff; }
.btn-warning:hover:not(:disabled) { background: #d48806; }
.btn-danger { background: #ff4d4f; color: #fff; }
.btn-danger:hover:not(:disabled) { background: #cf1322; }
.btn-outline { background: transparent; color: #1a73e8; border: 1px solid #1a73e8; }
.btn-outline:hover:not(:disabled) { background: #e6f7ff; }
.btn-sm { padding: 4px 12px; font-size: 12px; }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #fafafa; text-align: left; padding: 10px 12px; font-weight: 600; border-bottom: 2px solid #e8e8e8; white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
tr:hover td { background: #fafafa; }
th:first-child, td:first-child { padding-left: 20px; }
th:last-child, td:last-child { padding-right: 20px; }

.badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.badge-pending { background: #f5f5f5; color: #999; }
.badge-crawled { background: #e6f7ff; color: #1890ff; }
.badge-generated { background: #f6ffed; color: #52c41a; }
.badge-passed { background: #f6ffed; color: #389e0d; }
.badge-failed { background: #fff1f0; color: #cf1322; }
.badge-submitted { background: #e6f7ff; color: #1890ff; }
.badge-skipped { background: #f5f5f5; color: #999; }

/* Progress */
.progress-wrap { display: flex; align-items: center; gap: 12px; }
progress { flex: 1; height: 8px; border-radius: 4px; appearance: none; -webkit-appearance: none; }
progress::-webkit-progress-bar { background: #f0f0f0; border-radius: 4px; }
progress::-webkit-progress-value { background: linear-gradient(90deg, #52c41a, #1a73e8); border-radius: 4px; }
progress::-moz-progress-bar { background: linear-gradient(90deg, #52c41a, #1a73e8); border-radius: 4px; }
.progress-label { font-size: 13px; color: #666; min-width: 40px; text-align: right; }

/* Log */
.log-box { background: #1e1e1e; color: #d4d4d4; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 12px; padding: 12px 16px; border-radius: 6px; height: 200px; overflow-y: auto; line-height: 1.6; }
.log-box .info { color: #6a9955; }
.log-box .warn { color: #dcdcaa; }
.log-box .error { color: #f44747; }
.log-box .debug { color: #569cd6; }
.log-box .highlight { color: #c586c0; }

/* Action buttons */
.actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* Checkbox styling */
input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; }

/* Footer info */
.footer-info { text-align: center; color: #999; font-size: 12px; padding: 8px; }

/* Responsive */
@media (max-width: 768px) {
  .container { padding: 8px; }
  .login-row { flex-direction: column; align-items: stretch; }
  .actions { flex-direction: column; }
  .btn { justify-content: center; }
}

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid #e8e8e8; margin-bottom: 0; }
.tab { padding: 10px 20px; cursor: pointer; font-size: 13px; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab:hover { color: #1a73e8; }
.tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }
.tab-content { display: none; }
.tab-content.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Python 实训作业管理系统</h1>
    <div class="subtitle">10.10.15.23 - 仅供学习，请在24小时内移除，禁止进行违法行为</div>
  </div>
</div>

<div class="container">
  <!-- Card: Login & Actions -->
  <div class="card">
    <div class="card-header">
      <span>控制面板</span>
      <span id="loginStatus" class="login-status offline">● 未登录</span>
    </div>
    <div class="card-body">
      <div class="login-row">
        <button class="btn btn-primary" id="btnLogin" onclick="doLogin()">登录 (浏览器)</button>
        <button class="btn btn-outline" id="btnLogout" onclick="doLogout()" disabled>退出</button>
        <span style="color:#999;font-size:12px">|</span>
        <button class="btn btn-success" id="btnCrawl" onclick="doCrawl()" disabled>抓取选中</button>
        <button class="btn btn-warning" id="btnGenerate" onclick="doGenerate()" disabled>生成答案(选中)</button>
        <button class="btn btn-primary" id="btnSubmit" onclick="doSubmitSelected()" disabled>提交选中</button>
      </div>
      <div style="margin-top:12px">
        <label><input type="checkbox" id="checkSelectAll" onchange="toggleSelectAll()"> 全选/取消</label>
        <span style="color:#999;font-size:12px;margin-left:8px">勾选作业后点击上方按钮操作</span>
      </div>
    </div>
  </div>

  <!-- Card: Assignment List -->
  <div class="card">
    <div class="card-header">
      <span>作业列表 (共 <span id="totalCount">21</span> 个)</span>
      <div>
        <span id="statsSummary" style="font-size:12px;color:#999;"></span>
      </div>
    </div>
    <div class="card-body" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:36px"></th>
              <th style="width:60px">ID</th>
              <th>名称</th>
              <th style="width:80px">类型</th>
              <th style="width:120px">状态</th>
              <th>消息</th>
            </tr>
          </thead>
          <tbody id="assignTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Card: Progress & Log -->
  <div class="card">
    <div class="card-header">
      <span>进度 & 日志</span>
    </div>
    <div class="card-body">
      <div class="progress-wrap" style="margin-bottom:12px">
        <progress id="progressBar" value="0" max="100"></progress>
        <span class="progress-label" id="progressLabel">0%</span>
      </div>
      <div class="log-box" id="logBox">
        <div class="info">[系统] 启动就绪，请点击「登录」开始操作</div>
      </div>
    </div>
  </div>

  <div class="footer-info">
    Python 实训作业自动管理系统 · 使用 Playwright 驱动 Edge 浏览器 · -Ocavely
</div>

<script>
const STATE = { loggedIn: false, busy: false, assignments: {} };
const EVENT_BUS = new EventTarget();

// ---------- UI helpers ----------
function el(id) { return document.getElementById(id); }
function log(msg, cls = 'info') {
  const box = el('logBox');
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = msg;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function updateUI() {
  el('loginStatus').textContent = STATE.loggedIn ? '● 已登录' : '● 未登录';
  el('loginStatus').className = 'login-status ' + (STATE.loggedIn ? 'online' : 'offline');
  el('btnLogin').disabled = STATE.loggedIn || STATE.busy;
  el('btnLogout').disabled = !STATE.loggedIn || STATE.busy;
  el('btnCrawl').disabled = !STATE.loggedIn || STATE.busy;
  el('btnGenerate').disabled = STATE.busy;
  el('btnSubmitAll').disabled = !STATE.loggedIn || STATE.busy;
  el('btnSubmitSelected').disabled = !STATE.loggedIn || STATE.busy;
}

function renderAssignments() {
  const tbody = el('assignTable');
  tbody.innerHTML = '';
  const data = STATE.assignments;
  const keys = Object.keys(data).sort((a,b) => a - b);
  let total = keys.length;
  let statusCount = {};
  keys.forEach(id => {
    const a = data[id];
    const st = a.status || 'pending';
    statusCount[st] = (statusCount[st] || 0) + 1;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="checkbox" data-id="${id}" ${a.selected ? 'checked' : ''} onchange="toggleAssign(${id}, this.checked)"></td>
      <td>${id}</td>
      <td>${a.title}</td>
      <td><span class="badge badge-${a.type === 'code_assign' ? 'generated' : 'pending'}">${a.type === 'code_assign' ? '代码' : '报告'}</span></td>
      <td><span class="badge badge-${st}">${statusLabel(st)}</span></td>
      <td style="font-size:12px;color:#999">${a.msg || ''}</td>
    `;
    tbody.appendChild(tr);
  });
  el('totalCount').textContent = total;
  const parts = [];
  if (statusCount['passed']) parts.push(`通过:${statusCount['passed']}`);
  if (statusCount['failed']) parts.push(`失败:${statusCount['failed']}`);
  if (statusCount['pending']) parts.push(`待处理:${statusCount['pending']}`);
  el('statsSummary').textContent = parts.join(' | ');
}

function statusLabel(s) {
  const m = {
    'pending': '待处理', 'crawled': '已抓取', 'generated': '已生成',
    'passed': '已通过', 'failed': '失败', 'submitted': '已提交', 'skipped': '跳过'
  };
  return m[s] || s;
}

let progressTimer = null;

function startPolling() {
  // poll for status
  setInterval(async () => {
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      STATE.loggedIn = d.logged_in;
      STATE.busy = d.busy;
      // merge assignments
      d.assignments.forEach(a => {
        STATE.assignments[a.id] = STATE.assignments[a.id] || {};
        Object.assign(STATE.assignments[a.id], a);
      });
      // progress
      const [cur, total] = d.progress;
      if (total > 0) {
        const pct = Math.round(cur / total * 100);
        el('progressBar').value = pct;
        el('progressLabel').textContent = pct + '%';
      }
      updateUI();
      renderAssignments();
    } catch(e) {}
  }, 1500);

  // SSE for logs
  const evtSource = new EventSource('/api/log');
  evtSource.onmessage = function(e) {
    try {
      const d = JSON.parse(e.data);
      if (d.msg) log(d.msg);
    } catch(e) {}
  };
}

// ---------- API actions ----------
async function apiPost(url, data = {}) {
  try {
    const r = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
    return await r.json();
  } catch(e) {
    return {ok: false, error: e.message};
  }
}

function getSelectedIds() {
  const selected = [];
  document.querySelectorAll('#assignTable input[type="checkbox"]:checked').forEach(cb => {
    selected.push(parseInt(cb.dataset.id));
  });
  return selected;
}

async function doLogin() {
  const r = await apiPost('/api/login');
  if (!r.ok) log(`[-] Login failed: ${r.error}`, 'error');
}

async function doLogout() {
  await apiPost('/api/logout');
}

async function doCrawl() {
  const selected = getSelectedIds();
  if (selected.length === 0) { log('[-] 请先勾选要抓取的作业', 'warn'); return; }
  const r = await apiPost('/api/crawl', {selected});
  if (!r.ok) log(`[-] Crawl failed: ${r.error}`, 'error');
}

async function doGenerate() {
  const selected = getSelectedIds();
  if (selected.length === 0) { log('[-] 请先勾选要生成答案的作业', 'warn'); return; }
  const r = await apiPost('/api/generate', {selected});
  if (!r.ok) log(`[-] Generate failed: ${r.error}`, 'error');
}

async function doSubmitSelected() {
  const selected = getSelectedIds();
  if (selected.length === 0) { log('[-] 请先勾选要提交的作业', 'warn'); return; }
  const r = await apiPost('/api/submit', {selected});
  if (!r.ok) log(`[-] Submit failed: ${r.error}`, 'error');
}

function toggleAssign(id, checked) {
  if (STATE.assignments[id]) STATE.assignments[id].selected = checked;
}

function toggleSelectAll() {
  const isChecked = el('checkSelectAll').checked;
  document.querySelectorAll('#assignTable input[type="checkbox"]').forEach(cb => {
    cb.checked = isChecked;
    const id = parseInt(cb.dataset.id);
    if (STATE.assignments[id]) STATE.assignments[id].selected = isChecked;
  });
}

// Init
renderAssignments();
startPolling();
log('[系统] Web 界面已启动', 'highlight');
</script>
</body>
</html>
